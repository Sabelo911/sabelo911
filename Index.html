<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Dashboard</h1>
        <div class="info">
            <div class="date">Thursday, 24 April 2026</div>
            <div class="weather">Durban ☀️ 23°C</div>
        </div>
    </header>

    <main>
        <div class="cards">
            <div class="card">Card 1</div>
            <div class="card">Card 2</div>
            <div class="card">Card 3</div>
        </div>

     <div class="dashboard-grid">
    <div class="left-column">
        <div class="chart-box productivity">
            <h3>📈 Productivity</h3>
            <p>+12% vs last month</p>
        </div>
        <div class="chart-box comparison">
            <h3>📊 Monthly Comparison</h3>
            <p>Linear graph coming soon</p>
        </div>
    </div>

    <div class="right-column">
        <div class="trending-box">
            <input type="text" placeholder="Search news..." class="search-bar">
            <div class="tabs">
                <button class="tab-btn active">Trending</button>
                <button class="tab-btn">Sport</button>
                <button class="tab-btn">Tech</button>
            </div>
            <div class="news-list">
                <p>• News item 1</p>
                <p>• News item 2</p>
                <p>• News item 3</p>
            </div>
        </div>
    </div>

</div>
    </main>

</body>
</html>
